<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Timeless Wardrobe — a private archive of classic menswear">
  <defs>
    <linearGradient id="page-wash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="48%" stop-color="#f7f4ed"/>
      <stop offset="100%" stop-color="#efe9dc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#163229" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#page-wash)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#163229" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="28" y1="92" x2="1172" y2="92" stroke="#163229" stroke-opacity="0.08" stroke-width="1"/>

  <rect width="1200" height="44" fill="#1b352d"/>
  <text x="72" y="28" fill="#f7f4ed" font-family="Helvetica, Arial, sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.2em">INDICIO ET CONSTANTIA</text>
  <text x="600" y="28" text-anchor="middle" fill="#f7f4ed" font-family="Helvetica, Arial, sans-serif" font-size="9.5" font-weight="400" letter-spacing="0.16em" opacity="0.9">Only What Endures</text>
  <text x="1128" y="28" text-anchor="end" fill="#f7f4ed" font-family="Helvetica, Arial, sans-serif" font-size="9.5" font-weight="500" letter-spacing="0.18em">Since 2020</text>

  <g filter="url(#soft-shadow)">
    <image xlink:href="monogram.png" x="522" y="118" width="156" height="156" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="600" y="338" text-anchor="middle" fill="#163229" font-family="Georgia, 'Times New Roman', serif" font-size="56" letter-spacing="0.34em">TIMELESS</text>
  <text x="600" y="396" text-anchor="middle" fill="#163229" font-family="Georgia, 'Times New Roman', serif" font-size="56" letter-spacing="0.34em">WARDROBE</text>

  <line x1="456" y1="422" x2="744" y2="422" stroke="#163229" stroke-opacity="0.22" stroke-width="1"/>

  <text x="600" y="468" text-anchor="middle" fill="#163229" font-family="Helvetica, Arial, sans-serif" font-size="21" letter-spacing="0.02em" opacity="0.9">A private archive of classic menswear</text>
  <text x="600" y="502" text-anchor="middle" fill="#163229" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" letter-spacing="0.2em" opacity="0.58">CURATED BY T. Y. LIN</text>
</svg>
