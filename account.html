<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Manage the Timeless Wardrobe collection." />
    <title>Account · Timeless Wardrobe</title>
    <link rel="icon" href="./icons/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/favicon-180.png" sizes="180x180" />
    <link rel="manifest" href="./site.webmanifest" />
    <script src="js/tw-page-theme-boot.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="js/tw-admin-boot.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login-page account-page theme-catalogue">
    <a class="skip-link" href="#account-main">Skip to account</a>

    <div class="site-header-shell site-header-shell--compact">
      <div class="site-utility-bar" role="note" aria-label="Brand masthead">
        <div class="site-utility-bar__inner">
          <span class="site-utility-bar__left">INDICIO ET CONSTANTIA</span>
          <span class="site-utility-bar__center">Only What Endures</span>
          <span class="site-utility-bar__right">Since 2020</span>
        </div>
      </div>
      <header class="site-header site-header--solid">
        <div class="site-header__container site-header__inner">
          <div class="site-header__bar site-header__brand-nav" aria-label="Primary header">
            <p class="site-title site-brand">
              <a href="/" class="site-title__primary">
                <span class="site-title__mark" role="img" aria-label="Timeless Wardrobe"></span>
                <span class="site-title__text-stack site-brand-wordmark">
                  <span class="site-title__wordmark-line">Timeless</span>
                  <span class="site-title__wordmark-line">Wardrobe</span>
                </span>
              </a>
            </p>
            <div class="site-header__tools">
              <div id="tw-editor-auth" class="site-header__editor-auth" hidden></div>
              <button
                type="button"
                id="site-header-search-btn"
                class="site-header__search-btn"
                aria-expanded="false"
                aria-controls="site-header-search-wrap"
                aria-label="Open search"
                title="Search"
              >
                <span class="site-header__search-icon" aria-hidden="true">
                  <svg class="site-header__tool-glyphs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle class="site-header__tool-glyph" cx="7" cy="7" r="4.25"/>
                    <line class="site-header__tool-glyph site-header__tool-glyph--cap-round" x1="10.35" y1="10.35" x2="13.15" y2="13.15"/>
                  </svg>
                </span>
              </button>
              <a class="site-header__account-link" href="/account" aria-label="Open account" title="Account">
                <span class="site-header__account-icon" aria-hidden="true">
                  <svg class="site-header__tool-glyphs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle class="site-header__tool-glyph site-header__tool-glyph--cap-round" cx="8" cy="4.45" r="2.05"/>
                    <path class="site-header__tool-glyph site-header__tool-glyph--cap-round" d="M3.15 13C3.55 9.75 5.35 8.15 8 8.15C10.65 8.15 12.45 9.75 12.85 13"/>
                  </svg>
                </span>
              </a>
              <button
                type="button"
                id="site-header-saved-toggle"
                class="site-header__styling-board-btn"
                aria-expanded="false"
                aria-controls="styling-board-drawer"
                aria-label="Open Outfits"
                title="Outfits"
              >
                <span class="site-header__styling-board-icon" aria-hidden="true">
                  <svg class="styling-board-glyph site-header__tool-glyphs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path class="site-header__tool-glyph site-header__tool-glyph--cap-round" d="M8 6.1V4.4C8 3.45 9.4 3.45 9.4 4.4 9.4 4.85 9.05 4.95 8.85 4.85"/>
                    <path class="site-header__tool-glyph site-header__tool-glyph--cap-round" d="M8 6.1C5.5 7 2 10 1.7 11.5C1.45 11.7 1.55 12 1.85 12H14.15C14.45 12 14.55 11.7 14.3 11.5C14 10 10.5 7 8 6.1Z"/>
                  </svg>
                </span>
                <span class="site-header__styling-board-label-wrap">
                  <span class="site-header__styling-board-label">Outfits</span>
                  <span id="styling-board-count" class="site-header__styling-board-count" hidden></span>
                </span>
              </button>
            </div>
          </div>
        </div>
      </header>
    </div>

    <main id="account-main" class="login-page-main account-page-main" role="main">
      <div class="account-page-hero">
        <div class="account-page-hero__copy">
          <h1 class="login-page-main__title">Welcome back</h1>
          <div
            id="account-status"
            class="login-page-main__status login-page-main__status--pending"
            role="status"
            aria-live="polite"
          >
            <span id="account-status-text" class="login-page-main__status-text">Loading…</span>
          </div>
        </div>
        <button id="account-signout" type="button" class="account-signout account-signout--hero" hidden>
          Sign Out
        </button>
      </div>
      <div id="account-body" class="account-body" hidden></div>
    </main>

    <script src="data/wardrobe.js"></script>
    <script src="js/tw-supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4/dist/umd/supabase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
