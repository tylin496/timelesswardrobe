<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Sign in to edit the Timeless Wardrobe collection." />
    <title>Sign in · Timeless Wardrobe</title>
    <link rel="icon" href="/icons/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-pwa.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script src="js/tw-page-theme-boot.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="js/tw-admin-boot.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login-page theme-catalogue">
    <a class="skip-link" href="#login-main">Skip to sign in</a>

    <div class="site-header-shell site-header-shell--compact">
      <div class="site-utility-bar" role="note" aria-label="Brand masthead">
        <div class="site-utility-bar__inner">
          <span class="site-utility-bar__left">INDICIO ET CONSTANTIA</span>
          <span class="site-utility-bar__center">Only What Endures</span>
          <span class="site-utility-bar__right">Since 2020</span>
        </div>
      </div>
      <header class="site-header site-header--solid">
        <div class="site-header__container site-header__inner">
          <div class="site-header__bar site-header__brand-nav" aria-label="Primary header">
            <p class="site-title site-brand">
              <a href="/" class="site-title__primary">
                <span class="site-title__mark" role="img" aria-label="Timeless Wardrobe"></span>
                <span class="site-title__text-stack site-brand-wordmark">
                  <span class="site-title__wordmark-line">Timeless</span>
                  <span class="site-title__wordmark-line">Wardrobe</span>
                </span>
              </a>
            </p>
            <div class="site-header__tools">
              <div id="tw-editor-auth" class="site-header__editor-auth" hidden></div>
            </div>
          </div>
        </div>
      </header>
    </div>

    <main id="login-main" class="login-page-main" role="main">
      <h1 class="login-page-main__title">Editor sign-in</h1>
      <div
        id="login-status"
        class="login-page-main__status login-page-main__status--pending"
        role="status"
        aria-live="polite"
      >
        <span id="login-status-text" class="login-page-main__status-text">Opening Google sign-in…</span>
      </div>
      <p class="login-page-main__hint">
        Allowed Google accounts only. After sign-in you can add pieces, edit items, and use export tools on the
        collection.
      </p>
      <p class="login-page-main__actions">
        <button type="button" class="btn btn--small" id="login-retry" hidden>Try Google sign-in again</button>
        <a class="btn btn--small btn--ghost" href="/collection.html">Back to collection</a>
      </p>
    </main>

    <script src="data/wardrobe.js"></script>
    <script src="js/tw-supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4/dist/umd/supabase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
